        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 18.55, "b_start": 0.0, "b_end": 35.1, "orig": "15 juni. Åter sitter jag vid fönstret, den blå natten\nvakar därute, och det hviskar och prasslar under\nträden. Jag såg ett äkta par i kväll på min aftonpromenad. Henne kände jag strax igen.", "en": "June 15. Again I sit by the window, the blue night watches outside, and it whispers and rustles under the trees. I saw a genuine couple this evening on my evening walk. I recognized her immediately."}, {"start": 19.55, "end": 49.7, "b_start": 35.1, "b_end": 77.9, "orig": "Det är\ninte så många år sedan jag dansade med henne\npå baler, och jag har inte glömt, att hon hvar\ngång jag såg henne gaf mig en sömnlös natt i\npresent. Men det visste hon ingenting om. Hon\nvar icke kvinna då ännu. Hon var jungfru. Hon var\nden lefvande drömmen: mannens dröm om kvinnan.", "en": "It is not so many years since I danced with her at balls, and I have not forgotten that every time I saw her she gave me a sleepless night as a present. But she knew nothing about that. She was not yet a woman then. She was a virgin. She was the living dream: man's dream of woman."}, {"start": 50.7, "end": 74.26, "b_start": 77.9, "b_end": 123.3, "orig": "Nu gick hon stadigt gatan fram vid den äkta\nmannens arm. Dyrare klädd än förr, men tarfligare, mera borgerligt; något slocknadt och tärdt\ni blicken, och på samma gång en belåten hustrumin som om hon bar sin mage framför sig på\nen nysilfverbricka. Nej, jag förstår det icke.", "en": "Now she walked steadily up the street on her husband's arm. More expensively dressed than before, but more elaborate, more bourgeois; something extinguished and tarnished in her eyes, and at the same time a contented housewifely look as if she carried her stomach before her on a silver platter. No, I don't understand it."}, {"start": 75.26, "end": 91.63, "b_start": 123.3, "b_end": 151.73, "orig": "Hvarför skall det\nvara så, hvarför skall det alltid bli så? Hvarför\nskall kärleken vara trollguldet, som andra dagen\nblir vissna löf, eller smuts, eller ölsupa?", "en": "Why must it be so, why must it always be so? Why should love be the magic gold, which on the second day becomes withered leaves, or dirt, or beer soup?"}, {"start": 92.63, "end": 119.46, "b_start": 151.73, "b_end": 196.64, "orig": "Ur\nmänniskornas längtan efter kärlek har ju hela\nden sidan af kulturen spirat upp, som icke direkt\nsyftar till hungerns stillande eller försvar mot\nfiender. Vårt skönhetssinne har ingen annan\nkälla. All konst, all dikt, all musik har druckit\nur den.", "en": "From people's longing for love, the whole side of culture has sprung up, which does not directly aim at satisfying hunger or defense against enemies. Our sense of beauty has no other source. All art, all poetry, all music has drunk from it."}, {"start": 120.46, "end": 155.22, "b_start": 196.64, "b_end": 263.47, "orig": "Den tarfligaste moderna historiemålning\nlika väl som Rafaels madonnor och Steinlens\nsmå parisiska arbeterskor, »Dödens ängel» likaväl som Höga visan och Buch der Lieder, koralen och Wienervalsen, ja hvarje gipsornament på\ndet tarfliga hus där jag bor, hvarje figur i tapeten, formen på porslinsvasen där och mönstret i\nmin halsduk, allt som vill pryda och försköna,\ndet må nu lyckas eller misslyckas, stammar därifrån, fast på mycket långa omvägar ibland.", "en": "The most exquisite modern history painting as well as Raphael's Madonnas and Steinlen's little Parisian workers' shoes, the \"Angel of Death\" as well as the High Song and the Buch der Lieder, the chorale and the Viennese waltz, yes, every plaster ornament on the exquisite house where I live, every figure in the wallpaper, the shape of the porcelain vase there and the pattern in my scarf, everything that wants to adorn and beautify, whether it succeeds or fails, stutters from there, though on very long detours sometimes."}, {"start": 156.22, "end": 171.46, "b_start": 263.47, "b_end": 290.08, "orig": "Och\ndet är intet nattligt hugskott af mig, utan bevisadt\nhundra gånger. Men den källan heter icke kärleken, utan\nden heter: drömmen om kärlek.", "en": "And it's not a nocturnal hack shot by me, but proven a hundred times over. But that source is not called love, but it is called: the dream of love."}, {"start": 172.46, "end": 196.24, "b_start": 290.08, "b_end": 333.48, "orig": "Och å andra sidan är allt, som står i samband\nmed drömmens fullbordan, med driftens\ntillfredsställelse, och som följer af den, inför vår\ndjupaste instinkt något oskönt och oanständigt. Detta kan icke bevisas, det är bara en känsla:\nmin känsla, och jag tror egentligen allas.", "en": "And on the other hand, everything that stands in connection with the fulfillment of the dream, with the satisfaction of the urge, and that follows from it, is, before our deepest instinct, something ugly and indecent. This cannot be proven, it's just a feeling: my feeling, and I think everyone's really."}, {"start": 197.24, "end": 217.59, "b_start": 333.48, "b_end": 370.48, "orig": "Människorna behandla alltid hvarandras kärlekshistorier som något lågt eller komiskt och göra ofta\nicke ens undantag för sina egna. Och sedan\nföljderna ... En kvinna i grossess är något förskräckligt. Ett nyfödt barn är vedervärdigt.", "en": "People always treat each other's love stories as something low or comical and often don't even make an exception for their own. And then the consequences ... A woman in grossess is something terrible. A newborn child is worthy."}, {"start": 218.59, "end": 233.47, "b_start": 370.48, "b_end": 397.03, "orig": "En\ndödsbädd gör sällan ett så ohyggligt intryck som\nen barnsbörd, denna förfärliga symfoni af skrik\noch smuts och blod. Men först och sist själfva akten.", "en": "A deathbed rarely makes such a hideous impression as childbirth, this terrible symphony of screams and dirt and blood. But first and last the act itself."}, {"start": 234.47, "end": 246.4, "b_start": 397.03, "b_end": 419.34, "orig": "Jag glömmer aldrig, då jag som barn för första gången\nunder ett af de stora kastanjeträden på skolgården hörde en kamrat förklara »hur det går\ntill».", "en": "I will never forget when, as a child, for the first time under one of the big chestnut trees in the school yard I heard a friend explain \"how it's done\"."}, {"start": 247.4, "end": 266.62, "b_start": 419.34, "b_end": 452.64, "orig": "Jag ville inte tro det; det måste komma\nflera andra pojkar till och bekräfta det och skratta\nåt min dumhet, och jag trodde det knappt ändå,\njag sprang min väg i fullt ursinne. Hade alltså\nfar och mor gjort på det sättet?", "en": "I didn't want to believe it; several other boys must come and confirm it and laugh at my stupidity, and I hardly believed it anyway, I ran my way in a frenzy. So had father and mother done it that way?"}, {"start": 267.62, "end": 285.79, "b_start": 452.64, "b_end": 483.28, "orig": "Och skulle jag\nsjälf göra så när jag blef stor, kunde jag inte\nslippa ifrån det? Jag hade alltid känt ett stort förakt för de\ndåliga gossar, som brukade rita fula ord på\nväggarna och planken.", "en": "And would I do that myself when I grew up, couldn't I escape it? I had always felt a great contempt for the bad boys, who used to draw ugly words on the walls and planks."}, {"start": 286.79, "end": 309.54, "b_start": 483.28, "b_end": 522.05, "orig": "Men i den stunden var\ndet mig som om Gud själf hade ritat något fult\npå den blå vårhimmeln, och jag tror egentligen\natt det var då jag först började undra, om det\nverkligen fanns någon gud. Ännu i dag har jag inte riktigt hämtat mig\nfrån min förvåning.", "en": "But at that moment it was to me as if God himself had drawn something ugly in the blue spring sky, and I really think that was when I first began to wonder if there really was a god. To this day, I still haven't quite recovered from my surprise."}, {"start": 310.54, "end": 334.28, "b_start": 522.05, "b_end": 562.28, "orig": "Hvarför måste vårt släktes\nlif bevaras och vår längtan stillas just genom ett\norgan som vi flera gånger om dagen begagna till\nafloppsrör för orenlighet; hvarför kunde det icke\nske genom en akt, som det låg värdighet och\nskönhet i på samma gång som den högsta vällust?", "en": "Why must the life of our family be preserved and our longing satisfied precisely through an organ that we several times a day use as a sewer for impurity; why could it not be done through an act in which there was dignity and beauty at the same time as the highest voluptuousness?"}, {"start": 335.28, "end": 349.08, "b_start": 562.28, "b_end": 594.79, "orig": "En akt, som kunde utföras i kyrkan, inför allas\nögon, likaväl som i mörkret och ensamheten? Eller i ett rosentempel midt i solen, under körsång och dans af bröllopsskaran.\n*\nJag vet inte hur länge jag har gått af och\nan genom rummen.", "en": "An act that could be performed in church, in front of everyone's eyes, as well as in the dark and solitude? Or in a rose temple in the middle of the sun, during choir singing and dancing by the wedding crowd. * I don't know how long I've been walking on and off through the rooms."}, {"start": 350.08, "end": 365.06, "b_start": 594.79, "b_end": 623.8, "orig": "Det ljusnar därute nu, kyrktuppen blänker\nmot öster, sparfvarna pipa hungrigt och hvasst. Besynnerligt, att det alltid går en rysning\ngenom luften före soluppgången.", "en": "It's getting lighter out there now, the church rooster is glinting towards the east, the sparrows are chirping hungrily and sharply. Strange, that there is always a shiver through the air before sunrise."}];
            window.__VOCAB_DATA__ = {};
        </script>
        <style>

            .en.revealed { display: block; }
            body.reading-mode .row-nav { display: none; }
            body.reading-mode #play-btn { display: none !important; }

            body.reading-mode .speed-btn { display: none; }
            .jump-btn { background: #fff3cd; color: #7a5c00; border: 1px solid #ffc107; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
            .status-badge { font-size: 0.7rem; margin-left: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
            .sv-word { cursor: pointer; color: #1565c0; }
            .sv-word .wikt-arrow { font-size: 0.55em; vertical-align: super; opacity: 0.6; }
            #word-popup {
                display: none; position: fixed; z-index: 999;
                background: white; border: 1px solid #ccc; border-radius: 10px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.18); padding: 12px 15px;

            }
            #word-popup .wp-lemma { font-size: 1rem; font-weight: bold; color: var(--primary); }
            #word-popup .wp-trans { color: #546e7a; font-style: italic; margin-bottom: 4px; }
            #word-popup .wp-cognate { color: #1565c0; font-weight: bold; }
            #word-popup .wp-etym { color: #555; font-size: 0.78rem; margin-top: 4px; }
            #word-popup .wp-link { display: inline-block; margin-top: 6px; font-size: 0.75rem; color: #2e7d32; text-decoration: underline; }
            #word-popup .wp-close { float: right; cursor: pointer; color: #999; font-size: 1rem; line-height: 1; margin-left: 8px; }
            @media (max-width: 768px) { .row { padding: 10px 12px; } }
        </style>
    </head>
    <body>
        <div class="header-box">

                    <div class="header-subtitle">Hjalmar Söderberg</div>

                <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                <span class="divider">|</span>
                <div class="mode-toggle">
                    <button id="modePodcast" class="mode-opt active" onclick="setMode('orig')" title="Listen and follow along with the translated text">Podcast<span class="mode-prog" id="prog-orig"></span></button>
                    <button id="modeInterleaved" class="mode-opt" onclick="setMode('bilingual')" title="Listen to alternating source and English audio">Interleaved<span class="mode-prog" id="prog-bilingual"></span></button>

        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modePodcast = document.getElementById('modePodcast');
            const modeInterleaved = document.getElementById('modeInterleaved');
            const modeReading = document.getElementById('modeReading');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "doktor-glas-ch5.mp3", bilingual: "doktor-glas-ch5.bilingual.mp3" };
            const startPattern = null;
            const epKey = 'doktor-glas.ch5';
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode] || sources['orig'], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            // --- Reading mode ---
            let readingObserver = null;

            function enterReadingMode() {
                audio.pause();
                document.body.classList.add('reading-mode');
                document.querySelectorAll('.row').forEach(row => {
                    if (readingObserver) readingObserver.observe(row);
                });
                if (epKey) {
                    const saved = parseInt(localStorage.getItem('readScroll_' + epKey) || '0');
                    if (saved > 0) requestAnimationFrame(() => window.scrollTo({ top: saved, behavior: 'instant' }));
                }
            }

            function exitReadingMode() {
                document.body.classList.remove('reading-mode');
                if (readingObserver) { readingObserver.disconnect(); }
                document.querySelectorAll('.en.revealed').forEach(el => el.classList.remove('revealed'));
            }

            readingObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const enEl = entry.target.querySelector('.en');
                        if (enEl) enEl.classList.add('revealed');
                    }
                });
            }, { threshold: 0.3 });

            // --- Sticky position ---
            function updateModeProgress() {
                if (!epKey) return;
                const audioPct = parseFloat(localStorage.getItem('audioPct_' + epKey) || '0');
                const readPct  = parseFloat(localStorage.getItem('readPct_'  + epKey) || '0');
                document.getElementById('prog-orig').textContent      = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-bilingual').textContent = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-reading').textContent   = readPct  > 0 ? Math.round(readPct)  + '%' : '';
            }

            function updateJumpBtn() {
                if (!epKey) return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                document.getElementById('jump-btn').style.display = (mode !== 'reading' && saved > 5) ? '' : 'none';
            }

            function jumpToLast() {
                if (!epKey || mode === 'reading') return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                if (!saved || !data.length) return;
                audio.currentTime = saved;
                const idx = data.findIndex(item => saved >= item.start && saved <= item.end);
                if (idx !== -1) {
                    const row = document.getElementById('row-' + idx);
                    if (row) { userScrolling = false; row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }
                audio.play();
            }

            let lastSaveWallTime = 0;
            function saveAudioPos() {
                if (epKey && mode !== 'reading' && audio.currentTime > 5) {
                    localStorage.setItem('audioPos_' + epKey, audio.currentTime.toString());
                    if (audio.duration > 0) {
                        localStorage.setItem('audioPct_' + epKey, (audio.currentTime / audio.duration * 100).toString());
                    }
                    lastSaveWallTime = Date.now();
                    updateModeProgress();
                }
            }
            audio.addEventListener('pause', saveAudioPos);

            function setMode(newMode) {
                if (newMode === mode) return;
                const wasReading = (mode === 'reading');
                const willRead = (newMode === 'reading');
                if (wasReading) exitReadingMode();
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = newMode;
                if (epKey) localStorage.setItem('epMode_' + epKey, mode);
                modePodcast.classList.toggle('active', mode === 'orig');
                modeInterleaved.classList.toggle('active', mode === 'bilingual');
                modeReading.classList.toggle('active', mode === 'reading');
                if (willRead) {
                    enterReadingMode();
                    return;
                }
                audio.src = sources[mode] || sources['orig'];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                updateJumpBtn();
            }

            checkAudioStatus();
            updateJumpBtn();
            updateModeProgress();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) { playBtn.style.display = 'none'; return; }
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
                playBtn.style.display = 'block';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            let readScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
                if (epKey && mode === 'reading') {
                    clearTimeout(readScrollTimer);
                    readScrollTimer = setTimeout(() => {
                        localStorage.setItem('readScroll_' + epKey, window.scrollY.toString());
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        if (maxScroll > 0) {
                            localStorage.setItem('readPct_' + epKey, (window.scrollY / maxScroll * 100).toString());
                        }
                        updateModeProgress();
                    }, 500);
                }
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('doktor-glas-ch5.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('doktor-glas-ch5.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                // Restore sticky mode
                if (epKey) {
                    const savedMode = localStorage.getItem('epMode_' + epKey);
                    if (savedMode && savedMode !== mode) {
                        mode = savedMode;
                        modePodcast.classList.toggle('active', mode === 'orig');
                        modeInterleaved.classList.toggle('active', mode === 'bilingual');
                        modeReading.classList.toggle('active', mode === 'reading');
                        if (mode !== 'reading') {
                            audio.src = sources[mode] || sources['orig'];
                            checkAudioStatus();
                        }
                    }
                }
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (mode === 'reading') {
                    enterReadingMode();
                } else if (data.length > 0) {
                    const savedPos = epKey ? parseFloat(localStorage.getItem('audioPos_' + epKey) || '0') : 0;
                    if (savedPos > 5) {
                        seekTargetTime = savedPos;
                        initialSeekDone = false;
                        applySeek();
                    } else {
                        let targetIdx = 0;
                        if (startPattern !== null) {
                            const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                            const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                            targetIdx = matchIdx !== -1 ? matchIdx : 0;
                        }
                        const target = data[targetIdx];
                        seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                        const targetRow = document.getElementById('row-' + targetIdx);
                        if (targetRow) {
                            requestAnimationFrame(() => {
                                if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                                movePlayBtn(targetRow);
                            });
                        }
                        if (startPattern !== null) applySeek();
                    }
                    updateJumpBtn();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                // Save to localStorage every 5s; update display every tick
                if (Date.now() - lastSaveWallTime > 5000) saveAudioPos();
                if (epKey && audio.duration > 0 && mode !== 'reading') {
                    const pct = Math.round(now / audio.duration * 100);
                    document.getElementById('prog-orig').textContent = pct > 0 ? pct + '%' : '';
                    document.getElementById('prog-bilingual').textContent = pct > 0 ? pct + '%' : '';
                }

                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
