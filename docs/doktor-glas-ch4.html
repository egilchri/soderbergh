        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 25.63, "b_start": 0.0, "b_end": 44.17, "orig": "14 juni. Hvilket yrke! Hur kom det sig att jag\nbland alla näringsgrenar valde den, som passade\nmig minst? En läkare måste vara ett af de två:\nmänniskovän eller ärelysten. – Det är sant, på\nden tiden trodde jag mig vara bägge delarna.", "en": "June 14. What a profession! How did it happen that among all the branches of industry I chose the one that suited me the least? A doctor must be one of the two: friend of man or greedy. - It's true, at the time I thought I was both."}, {"start": 26.63, "end": 53.08, "b_start": 44.17, "b_end": 89.76, "orig": "Åter var här i dag en liten kvinna, som\ngrät och tiggde och bad, att jag skulle hjälpa\nhenne. Jag känner henne sedan flera år. Gift\nmed en liten tjänsteman, fyra tusen om året eller\nnågot sådant, och tre barn. Barnen kommo slag\ni slag de tre första åren.", "en": "Again there was a little woman here today, crying and begging and begging me to help her. I have known her for several years. Married to a small official, four thousand a year or something like that, and three children. The children came in spades in the first three years."}, {"start": 54.08, "end": 80.53, "b_start": 89.76, "b_end": 137.03, "orig": "Sedan har hon fått\nvara förskonad i fem eller sex år, hon har vunnit igen en smula hälsa och krafter och ungdom,\noch hemmet har hunnit ordna sig, resa sig litet\nefter olyckorna. Knappt om brödet naturligtvis,\nmen det går ändå, tycks det. – Så med ens\när olyckan där igen.", "en": "Then she has been spared for five or six years, she has regained a little health and strength and youth, and the home has had time to arrange itself, to rise a little after the accidents. Hardly about the bread, of course, but it still works, it seems. - So with even, the accident is there again."}, {"start": 81.53, "end": 110.06, "b_start": 137.03, "b_end": 187.08, "orig": "Hon kunde knappt tala för gråt. Jag svarade naturligtvis med den vanliga\nutanläxan, som jag alltid läser upp i liknande\nfall: min plikt som läkare, och aktningen för\nmänniskolif, också det spädaste. Jag var allvarlig och obeveklig. Så måste\nhon då gå till sist, skamsen, förvirrad, hjälplös.", "en": "She could hardly speak for crying. I of course answered with the usual rote lesson, which I always recite in similar cases: my duty as a doctor, and respect for human life, even the smallest. I was serious and relentless. So she must go to the end, ashamed, confused, helpless."}, {"start": 111.06, "end": 130.53, "b_start": 187.08, "b_end": 223.38, "orig": "Jag annoterade fallet; det var det adertonde i\nmin praktik, och jag är likväl icke kvinnoläkare. Det första glömmer jag aldrig. Det var en\nung flicka, tjugutvå år eller så; en stor mörkhårig, litet vulgär ung skönhet.", "en": "I annotated the case; it was the eighteenth in my practice, and I'm not a gynecologist after all. I'll never forget the first one. It was a young girl, twenty-two or so; a tall dark-haired, slightly vulgar young beauty."}, {"start": 131.53, "end": 151.86, "b_start": 223.38, "b_end": 259.63, "orig": "Man såg strax,\natt hon var af den sorten som måste ha uppfyllt\njorden på Luthers tid, om han annars hade rätt\ndå han skref: det är lika omöjligt för en kvinna\natt lefva utan man som att bita af sin egen näsa. Tjockt borgerligt blod.", "en": "You immediately saw that she was of the kind that must have filled the earth in Luther's time, if he was otherwise right when he wrote: it is as impossible for a woman to live without a man as it is to bite off her own nose. Thick bourgeois blood."}, {"start": 152.86, "end": 178.49, "b_start": 259.63, "b_end": 305.15, "orig": "Fadern var en förmögen\nhandlande; jag var husläkare i familjen, därför\nkom hon till mig. Hon var upprörd och utom\nsig men icke mycket blyg. Rädda mig, bad hon, rädda mig. – Jag svarade med plikten etc., men det var tydligen något\nsom hon icke förstod.", "en": "The father was a wealthy businessman; I was the family doctor, that's why she came to me. She was upset and beside herself but not very shy. Save me, she begged, save me. - I answered with the duty etc., but it was apparently something that she did not understand."}, {"start": 179.49, "end": 207.02, "b_start": 305.15, "b_end": 353.83, "orig": "Jag förklarade för henne\natt lagen icke förstår sig på skämt i sådana fall.\n– Lagen? Hon såg bara frågande ut. – Jag\nrådde henne att anförtro sig åt sin mor: så talar\nhon med pappa, och så blir det bröllop. – O,\nnej, min fästman har ingenting, och far skulle\naldrig förlåta mig.", "en": "I explained to her that the law does not understand jokes in such cases. - The law? She just looked questioning. - I advised her to confide in her mother: then she will talk to father, and then there will be a wedding. - Oh, no, my fiancé has nothing, and father would never forgive me."}, {"start": 208.02, "end": 236.05, "b_start": 353.83, "b_end": 400.81, "orig": "De voro icke förlofvade, hon\nsade »fästman» blott emedan hon icke kunde\nfinna något annat ord, älskare är ett romanord\nsom låter oanständigt i tal. – Rädda mig, har\nni då ingen barmhärtighet! Jag vet inte hvad jag\ngör, jag går i Norrström! Jag blef litet otålig.", "en": "They weren't engaged, she said \"fiancé\" only because she couldn't find another word, lover is a novel word that sounds indecent in speech. - Save me, then you have no mercy! I don't know what I'm doing, I'm going to Norrström! I got a little impatient."}, {"start": 237.05, "end": 260.47, "b_start": 400.81, "b_end": 441.96, "orig": "Hon ingaf mig icke\nheller något särskildt medlidande, sådant där\narrangerar sig ju alltid, när det bara finns pengar. Det är bara stoltheten som får lida en smula. Hon snyftade och snöt sig och talade förvirradt,\ntill sist kastade hon sig på golfvet och sparkade\noch skrek.", "en": "She didn't show me any particular pity either, things like that always happen when there's only money. It is only the pride that suffers a little. She sobbed and snorted and spoke confusedly, at last she threw herself on the golf course and kicked and screamed."}, {"start": 261.47, "end": 283.31, "b_start": 441.96, "b_end": 479.65, "orig": "Nå, det slutade naturligtvis som jag hade\ntänkt; fadern, en rå lymmel, gaf henne ett par\nörfilar, gifte henne sedan i rykande fart med\nmedbrottslingen och skickade ut dem på brölloppsresa. Sådana fall som hennes ha aldrig gjort mig\nhufvudbry.", "en": "Well, of course it ended as I had intended; the father, a raw rascal, gave her a pair of ear files, then married her off in a flash to the accomplice and sent them off on their honeymoon. Cases like hers have never bothered me."}, {"start": 284.31, "end": 310.26, "b_start": 479.65, "b_end": 523.15, "orig": "Men det gjorde mig ondt om den\nlilla bleka kvinnan i dag. Så mycket lidande\noch elände för ett så litet nöje. Aktningen för människolif – hvad är det i\nmin mun annat än ett gement hyckleri, och hvad\nkan det vara annat för den, som då och då har\ntillbragt en ledig stund med att tänka.", "en": "But I felt sorry for the little pale woman today. So much suffering and misery for so little pleasure. Respect for human life - what is it in my mouth but lowly hypocrisy, and what can it be to him who has now and then spent a free moment in thinking."}, {"start": 311.26, "end": 340.82, "b_start": 523.15, "b_end": 575.32, "orig": "Det\nmyllrar ju af människolif. Och vid främmande,\nokända, osedda människolif har aldrig någon på\nallvar fäst det ringaste afseende, kanske med\nundantag af några alltför påtagligt narraktiga\nfilantroper. Man visar det i handling. Alla regeringar och parlament i världen visa det. Och plikten.", "en": "It is teeming with human life. And to strange, unknown, unseen human lives, no one has ever seriously attached the slightest regard, perhaps with the exception of some too palpably silly philanthropists. It is shown in action. All governments and parliaments in the world show it. And the duty."}, {"start": 341.82, "end": 368.27, "b_start": 575.32, "b_end": 618.7, "orig": "Hvilken förträfflig skärm att\nkrypa bakom för att slippa göra det, som bör\ngöras. Men man kan ju inte heller sätta allt på\nspel, ställning, anseende, framtid, för att hjälpa\nfrämmande och likgiltiga människor. Att räkna\npå deras tystlåtenhet vore väl barnsligt.", "en": "What an excellent screen to crawl behind to avoid doing what should be done. But you can't put everything on the line, position, reputation, future, to help strangers and indifferent people. Counting on their silence would be childish."}, {"start": 369.27, "end": 394.47, "b_start": 618.7, "b_end": 663.71, "orig": "En väninna kommer i samma knipa, så hviskas det ett\nord om hvar hjälp står att få, och snart är man\nkänd. Nej, bäst att hålla sig till plikten, om den\nockså är en målad kuliss, som Potemkins byar. Jag är bara rädd att jag läser upp mitt pliktformulär\nså ofta, att jag till sist tror på det själf.", "en": "A friend gets into the same predicament, and a word is whispered about where to get help, and soon you are known. No, best to stick to duty, if it's also a painted backdrop, like Potemkin's villages. I'm just afraid that I read my duty form so often, that I end up believing it myself."}, {"start": 395.47, "end": 423.34, "b_start": 663.71, "b_end": 711.91, "orig": "Potemkin bedrog bara sin kejsarinna, hur mycket\nföraktligare är det icke att bedraga sig själf.\n*\nStällning, anseende, framtid. Som om jag\nicke hvar dag och hvar stund vore beredd att\npacka dessa kollyn ombord på det första skepp,\nsom kommer lastadt med en handling. En verklig handling.", "en": "Potemkin only deceived his empress, how much more despicable is it not to deceive oneself. * Position, reputation, future. As if every day and every moment I were not prepared to pack these bundles on board the first ship that comes loaded with a deed. A real action."}];
            window.__VOCAB_DATA__ = {};

        <script>
            const audio = document.getElementById('audio');
            const modePodcast = document.getElementById('modePodcast');
            const modeInterleaved = document.getElementById('modeInterleaved');
            const modeReading = document.getElementById('modeReading');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "doktor-glas-ch4.mp3", bilingual: "doktor-glas-ch4.bilingual.mp3" };
            const startPattern = null;
            const epKey = 'doktor-glas.ch4';
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode] || sources['orig'], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            // --- Reading mode ---
            let readingObserver = null;

            function enterReadingMode() {
                audio.pause();
                document.body.classList.add('reading-mode');
                document.querySelectorAll('.row').forEach(row => {
                    if (readingObserver) readingObserver.observe(row);
                });
                if (epKey) {
                    const saved = parseInt(localStorage.getItem('readScroll_' + epKey) || '0');
                    if (saved > 0) requestAnimationFrame(() => window.scrollTo({ top: saved, behavior: 'instant' }));
                }
            }

            function exitReadingMode() {
                document.body.classList.remove('reading-mode');
                if (readingObserver) { readingObserver.disconnect(); }
                document.querySelectorAll('.en.revealed').forEach(el => el.classList.remove('revealed'));
            }

            readingObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const enEl = entry.target.querySelector('.en');
                        if (enEl) enEl.classList.add('revealed');
                    }
                });
            }, { threshold: 0.3 });

            // --- Sticky position ---
            function updateModeProgress() {
                if (!epKey) return;
                const audioPct = parseFloat(localStorage.getItem('audioPct_' + epKey) || '0');
                const readPct  = parseFloat(localStorage.getItem('readPct_'  + epKey) || '0');
                document.getElementById('prog-orig').textContent      = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-bilingual').textContent = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-reading').textContent   = readPct  > 0 ? Math.round(readPct)  + '%' : '';
            }

            function updateJumpBtn() {
                if (!epKey) return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                document.getElementById('jump-btn').style.display = (mode !== 'reading' && saved > 5) ? '' : 'none';
            }

            function jumpToLast() {
                if (!epKey || mode === 'reading') return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                if (!saved || !data.length) return;
                audio.currentTime = saved;
                const idx = data.findIndex(item => saved >= item.start && saved <= item.end);
                if (idx !== -1) {
                    const row = document.getElementById('row-' + idx);
                    if (row) { userScrolling = false; row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }
                audio.play();
            }

            let lastSaveWallTime = 0;
            function saveAudioPos() {
                if (epKey && mode !== 'reading' && audio.currentTime > 5) {
                    localStorage.setItem('audioPos_' + epKey, audio.currentTime.toString());
                    if (audio.duration > 0) {
                        localStorage.setItem('audioPct_' + epKey, (audio.currentTime / audio.duration * 100).toString());
                    }
                    lastSaveWallTime = Date.now();
                    updateModeProgress();
                }
            }
            audio.addEventListener('pause', saveAudioPos);

            function setMode(newMode) {
                if (newMode === mode) return;
                const wasReading = (mode === 'reading');
                const willRead = (newMode === 'reading');
                if (wasReading) exitReadingMode();
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = newMode;
                if (epKey) localStorage.setItem('epMode_' + epKey, mode);
                modePodcast.classList.toggle('active', mode === 'orig');
                modeInterleaved.classList.toggle('active', mode === 'bilingual');
                modeReading.classList.toggle('active', mode === 'reading');
                if (willRead) {
                    enterReadingMode();
                    return;
                }
                audio.src = sources[mode] || sources['orig'];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                updateJumpBtn();
            }

            checkAudioStatus();
            updateJumpBtn();
            updateModeProgress();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) { playBtn.style.display = 'none'; return; }
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
                playBtn.style.display = 'block';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            let readScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
                if (epKey && mode === 'reading') {
                    clearTimeout(readScrollTimer);
                    readScrollTimer = setTimeout(() => {
                        localStorage.setItem('readScroll_' + epKey, window.scrollY.toString());
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        if (maxScroll > 0) {
                            localStorage.setItem('readPct_' + epKey, (window.scrollY / maxScroll * 100).toString());
                        }
                        updateModeProgress();
                    }, 500);
                }
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('doktor-glas-ch4.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('doktor-glas-ch4.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                // Restore sticky mode
                if (epKey) {
                    const savedMode = localStorage.getItem('epMode_' + epKey);
                    if (savedMode && savedMode !== mode) {
                        mode = savedMode;
                        modePodcast.classList.toggle('active', mode === 'orig');
                        modeInterleaved.classList.toggle('active', mode === 'bilingual');
                        modeReading.classList.toggle('active', mode === 'reading');
                        if (mode !== 'reading') {
                            audio.src = sources[mode] || sources['orig'];
                            checkAudioStatus();
                        }
                    }
                }
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (mode === 'reading') {
                    enterReadingMode();
                } else if (data.length > 0) {
                    const savedPos = epKey ? parseFloat(localStorage.getItem('audioPos_' + epKey) || '0') : 0;
                    if (savedPos > 5) {
                        seekTargetTime = savedPos;
                        initialSeekDone = false;
                        applySeek();
                    } else {
                        let targetIdx = 0;
                        if (startPattern !== null) {
                            const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                            const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                            targetIdx = matchIdx !== -1 ? matchIdx : 0;
                        }
                        const target = data[targetIdx];
                        seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                        const targetRow = document.getElementById('row-' + targetIdx);
                        if (targetRow) {
                            requestAnimationFrame(() => {
                                if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                                movePlayBtn(targetRow);
                            });
                        }
                        if (startPattern !== null) applySeek();
                    }
                    updateJumpBtn();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                // Save to localStorage every 5s; update display every tick
                if (Date.now() - lastSaveWallTime > 5000) saveAudioPos();
                if (epKey && audio.duration > 0 && mode !== 'reading') {
                    const pct = Math.round(now / audio.duration * 100);
                    document.getElementById('prog-orig').textContent = pct > 0 ? pct + '%' : '';
                    document.getElementById('prog-bilingual').textContent = pct > 0 ? pct + '%' : '';
                }

                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
