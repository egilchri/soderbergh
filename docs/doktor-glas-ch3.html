        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 20.71, "b_start": 0.0, "b_end": 38.53, "orig": "12 juni. Jag har aldrig sett en sådan sommar. Rötmånadshetta sedan midten af maj. Hela dagen\nstår ett tjockt töcken af damm alldeles stilla öfver\ngatorna och torgen. Först på kvällen lefver man upp en smula.", "en": "June 12. I have never seen a summer like this. Red moon heat since mid-May. All day long a thick fog of dust stands absolutely still over the streets and squares. Only in the evening does one liven up a bit."}, {"start": 21.71, "end": 45.98, "b_start": 38.53, "b_end": 81.31, "orig": "Jag tog en aftonpromenad nyss, som jag gör\nnästan hvar dag efter mina sjukbesök, och de\näro icke många nu på sommaren. Det kommer\nen sval, jämn luftström från öster, töcknet lyfter,\nseglar långsamt bort och blir till en lång slöja\naf rödt stoft bort i väster.", "en": "I took an evening walk just now, which I do almost every day after my sick visits, and there aren't many of them now in the summer. There is a cool, steady stream of air from the east, the mist lifts, sails slowly away, and becomes a long veil of red dust away in the west."}, {"start": 46.98, "end": 70.93, "b_start": 81.31, "b_end": 123.78, "orig": "Intet skrammel af arbetsåkdon mera, bara en droska då och då, och\nspårvagnen som ringer. Jag går gatan ner i sakta\nmak, träffar emellanåt en bekant och står och\npratar en stund i ett gathörn. Men hvarför skall\njag jämt möta pastor Gregorius?", "en": "No more clatter of work vehicles, just a cab every now and then, and the tram that rings. I walk down the street at a leisurely pace, occasionally meet an acquaintance and stand and talk for a while on a street corner. But why must I always meet Pastor Gregorius?"}, {"start": 71.93, "end": 96.14, "b_start": 123.78, "b_end": 164.47, "orig": "Jag kan inte\nse den mannen utan att jag kommer att tänka\npå en anekdot jag en gång i världen hörde om\nSchopenhauer. Den bistre filosofen satt en kväll\ni ett hörn i sitt kafé, ensam som vanligt; dörren\nöppnas och en person med ett osympatiskt utseende stiger in.", "en": "I cannot see that man without thinking of an anecdote I once heard about Schopenhauer. The gloomy philosopher sat one evening in a corner of his cafe, alone as usual; the door opens and a person with an unsympathetic appearance steps in."}, {"start": 97.14, "end": 115.22, "b_start": 164.47, "b_end": 194.99, "orig": "Schopenhauer betraktar honom\nmed ett ansikte, förvridet af vämjelse och fasa,\nrusar upp och börjar dunka mannen i hufvudet\nmed sin käpp. Det var bara med anledning af hans\nutseende.", "en": "Schopenhauer looks at him with a face contorted with disgust and horror, rushes up and begins to pound the man on the head with his cane. It was only because of his appearance."}, {"start": 116.22, "end": 134.07, "b_start": 194.99, "b_end": 226.08, "orig": "Nå, jag är nu ingen Schopenhauer; då jag\nsåg prästen komma emot mig på långt håll, det\nvar på Vasabron, stannade jag hastigt och ställde\nmig att se på utsikten med armarna stödda mot\nbroräcket.", "en": "Well, I'm no Schopenhauer now; when I saw the priest coming towards me from afar, it was on the Vasa Bridge, I stopped hastily and stood looking at the view with my arms supported against the bridge railing."}, {"start": 135.07, "end": 149.57, "b_start": 226.08, "b_end": 252.97, "orig": "Helgeandsholmens grå hus, den gamla\nbadstuns söndriga götiska träarkitektur som speglades bruten i det rinnande vattnet, de stora\ngamla pilarna, som doppade sina blad i strömmen.", "en": "The gray houses of Helgeandsholmen, the old sauna's rickety Gothic wooden architecture that was reflected broken in the running water, the big old willows, which dipped their leaves in the current."}, {"start": 150.57, "end": 192.69, "b_start": 252.97, "b_end": 326.11, "orig": "Jag hoppades att prästen inte hade sett\nmig och att han inte heller skulle känna igen\nmin ryggtafla, och jag hade redan i det närmaste\nglömt honom, då jag plötsligt fick se honom stå\nbredvid mig med armarna på broräcket liksom\njag och hufvudet på sned – i alldeles samma\nattityd som för tjugu år sen i Jakobs kyrka, då\njag satt i familjebänken vid min salig mors sida\noch för första gången såg denna förskräckliga\nfysionomi skjuta upp i predikstolen som en otäck\nsvamp och klämma i med sitt abba, käre fader.", "en": "I hoped that the priest had not seen me and that he would not recognize my back plate either, and I had already almost forgotten him, when suddenly I saw him standing beside me with his arms on the bridge railing like me and his head tilted - in exactly the same attitude as twenty years ago in St. James's Church, when I sat in the family pew by my blessed mother's side and for the first time saw this terrible physiognomy shoot up into the pulpit like a monster sponge and squeeze in with his abba, dear father."}, {"start": 193.69, "end": 205.09, "b_start": 326.11, "b_end": 348.18, "orig": "Samma feta, grådaskiga ansikte, samma smutsgula polisonger, litet gråa nu kanske, och samma\noutgrundligt gemena blick bakom glasögonen.", "en": "The same fat, grizzled face, the same dirty yellow sideburns, maybe a little gray now, and the same unfathomably mean look behind the glasses."}, {"start": 206.09, "end": 239.98, "b_start": 348.18, "b_end": 406.63, "orig": "Omöjligt att komma undan, jag är ju hans läkare\nnu liksom många andras, och han kommer till\nmig ibland med sina krämpor. – Se god afton,\nherr pastor, hur står det till. – Inte bra, inte\nriktigt bra, hjärtat är dåligt, bultar ojämnt, stannar ibland om nätterna, tycker jag. – Det gläder\nmig, tänkte jag, du kan gärna dö, din gamla\nrackare, så slipper jag se dig mera.", "en": "Impossible to escape, I am his doctor now like many others, and he comes to me sometimes with his ailments. - Good evening, Mr. Pastor, how are things? - Not good, not really good, the heart is bad, beats unevenly, sometimes stops at night, I think. - I'm glad, I thought, you can die, you old rascal, then I won't have to see you anymore."}, {"start": 240.98, "end": 265.07, "b_start": 406.63, "b_end": 448.5, "orig": "Du har för\nresten en ung och vacker hustru, som du förmodligen pinar lifvet ur, och när du dör gifter\nhon om sig och skaffar sig en mycket bättre\nman. Men högt sade jag: jaså, jaha, pastorn\nkanske kommer upp till mig en af dagarna, så\nfår vi se hur det är fatt.", "en": "After all, you have a young and beautiful wife, who you probably torment the life out of, and when you die she remarries and gets a much better husband. But I said out loud: well, well, maybe the pastor will come up to me one of these days, and we'll see how it goes."}, {"start": 266.07, "end": 292.02, "b_start": 448.5, "b_end": 491.42, "orig": "Men han hade mycket\nmera att tala om, viktiga saker: det är ju en\nrent af onaturlig värme och det är dumt att\ndet skall byggas ett stort riksdagshus på den\nlilla holmen där, och min hustru är för resten\ninte heller riktigt kry. Så gick han till sist, och jag fortsatte min\nväg.", "en": "But he had a lot more to talk about, important things: it's a purely unnatural heat and it's stupid that a big Riksdag house should be built on the little islet there, and my wife isn't really cool either. So he finally left, and I continued on my way."}, {"start": 293.02, "end": 316.75, "b_start": 491.42, "b_end": 535.6, "orig": "Jag kom in i gamla staden, uppför Storkyrkobrinken, in i gränderna. En kvaf skymning\ni de smala remnorna mellan husen, och besynnerliga skuggor utmed väggarna, skuggor som\nman aldrig ser till nere i våra kvarter.\n– – – Fru Gregorius. Det var ett underligt besök hon gjorde mig härom dagen.", "en": "I entered the old town, up Storkyrkobrinken, into the alleys. A sultry dusk in the narrow strips between the houses, and strange shadows along the walls, shadows that you never see down in our quarters. – – – Mrs Gregorius. It was a strange visit she paid me the other day."}, {"start": 317.75, "end": 344.46, "b_start": 535.6, "b_end": 582.43, "orig": "Hon\nkom på min mottagning; jag såg mycket väl när\nhon kom och att hon kom i god tid, men hon\nväntade till sist och lät andra, som kommo senare,\ngå före. Så kom hon då in till slut. Hon rodnade och stammade. Till sist fick hon fram\nnågonting om att hon hade ondt i halsen.", "en": "She came to my reception; I saw very well when she came, and that she came in good time, but she waited at last, and let others, who came later, go before. Then she finally came in. She blushed and stammered. Finally she got out something about her throat being sore."}, {"start": 345.46, "end": 367.98, "b_start": 582.43, "b_end": 623.65, "orig": "Ja,\ndet var för resten bättre nu. – Jag kommer\nigen i morgon, sade hon, jag har så brådtom nu ... Ännu har hon inte kommit igen. Jag kom ut ur gränderna, ner på Skeppsbron. Månen stod öfver Skeppsholmen, citrongul\ni det blå.", "en": "Yes, for the rest it was better now. - I'll come back tomorrow, she said, I'm in such a hurry now... She hasn't come back yet. I came out of the alleys, down to Skeppsbron. The moon was above Skeppsholmen, lemon yellow in the blue."}, {"start": 368.98, "end": 380.47, "b_start": 623.65, "b_end": 644.98, "orig": "Men hela min lätta och lugna stämning var borta, mötet med prästen hade fördärfvat\nden. Att det skall få finnas sådana människor till i världen som han!", "en": "But my whole light and calm mood was gone, the meeting with the priest had ruined it. That there should be more people like him in the world!"}, {"start": 381.47, "end": 407.18, "b_start": 644.98, "b_end": 688.24, "orig": "Hvem minns inte\ndet gamla problemet, som så ofta kommer under\ndebatt när det sitter några fattiga satar tillsammans vid ett kafébord: om du kunde döda en\nkinesisk mandarin bara genom att trycka på en\nknapp i väggen, eller genom en ren viljeakt, och\nsedan ärfva hans rikedomar – skulle du göra\ndet?", "en": "Who does not remember the old problem, which so often comes up for debate when some poor satas are sitting together at a cafe table: if you could kill a Chinese mandarin just by pressing a button on the wall, or by a sheer act of will, and then inherit his riches - would you do it?"}, {"start": 408.18, "end": 430.11, "b_start": 688.24, "b_end": 724.44, "orig": "Den frågan har jag aldrig gittat svara på,\nkanske därför att jag aldrig riktigt hårdt och\nbittert har känt fattigdomens elände. Men jag\ntror, att om jag kunde döda den där prästen\ngenom att trycka på en knapp i väggen så skulle\njag göra det.", "en": "I have never been able to answer that question, perhaps because I have never felt the misery of poverty really harshly and bitterly. But I think if I could kill that priest by pushing a button on the wall, I would."}, {"start": 431.11, "end": 453.22, "b_start": 724.44, "b_end": 764.77, "orig": "Då jag gick hem i den onaturliga, bleka\nnattskymningen, tycktes mig hettan åter lika\ntryckande som midt på dagen, liksom mättad\nmed ångest, de röda stoftskyarna, som lågo lagrade bortom fabriksskorstenarna på Kungsholmen,\nhade mörknat och liknade sofvande olyckor.", "en": "When I walked home in the unnatural, pale night twilight, the heat seemed to me again as oppressive as in the middle of the day, as if saturated with anxiety, the red clouds of dust, which lay beyond the factory chimneys on Kungsholmen, had darkened and resembled sleeping accidents."}, {"start": 454.22, "end": 464.92, "b_start": 764.77, "b_end": 784.94, "orig": "Jag gick hemåt med långa steg, ned åt Klara\nkyrka, med hatten i hand, ty svetten sipprade\nfram på min panna.", "en": "I walked home with long strides, down towards Klara church, hat in hand, because the sweat was dripping down my forehead."}, {"start": 465.92, "end": 488.96, "b_start": 784.94, "b_end": 825.8, "orig": "Icke ens under kyrkogårdens stora träd fanns det svalka, men på nästan\nhvarje bänk satt det ett par och hviskade, och\nnågra sutto i knä på hvarandra och kysstes med\ndruckna ögon.\n*\nJag sitter vid mitt öppna fönster nu och\nskrifver detta – för hvem?", "en": "Not even under the big trees in the cemetery was there any coolness, but on almost every bench there was a couple sitting and whispering, and some were sitting on each other's knees and kissing with drunken eyes. * I am sitting by my open window now writing this - for whom?"}, {"start": 489.96, "end": 516.62, "b_start": 825.8, "b_end": 870.72, "orig": "För ingen vän och\nför ingen väninna, knappt för mig själf ens, ty\njag läser icke i dag hvad jag skref i går och\nkommer icke att läsa detta i morgon. Jag skrifver för att röra min hand, min tanke rör sig\naf sig själf; skrifver för att döda en sömnlös\ntimme. Hvarför får jag inte sofva?", "en": "For no friend and for no girlfriend, hardly even for myself, for I do not read today what I wrote yesterday and will not read this tomorrow. I write to move my hand, my thought moves by itself; writing to kill a sleepless hour. Why can't I sleep?"}, {"start": 517.62, "end": 544.84, "b_start": 870.72, "b_end": 915.56, "orig": "Jag har ju\ninte begått något brott.\n*\nDet som jag skrifver ned på dessa blad är icke\nnågon bikt; för hvem skulle jag bikta mig? Jag\nberättar icke allt om mig själf. Jag berättar blott\ndet som behagar mig att berätta; men jag säger\ningenting som icke är sant.", "en": "I haven't committed any crime. * What I write down on these pages is not a confession; to whom should I confess? I don't tell everything about myself. I only tell what pleases me to tell; but I say nothing that is not true."}, {"start": 545.84, "end": 571.21, "b_start": 915.56, "b_end": 962.23, "orig": "Jag kan dock icke\nljuga bort min själs eländighet, om den är eländig.\n*\nDärute hänger den stora blå natten öfver\nkyrkogårdens träd. Det är tyst i staden nu, så\ntyst att suckarna och hviskningarna från skuggorna där nere tränga ända hit upp, och en enstaka gång skär ett fräckt skratt igenom.", "en": "However, I cannot lie away the misery of my soul, if it is miserable. * Out there, the big blue night hangs over the cemetery trees. It's quiet in the city now, so quiet that the sighs and whispers from the shadows down there penetrate all the way up here, and once in a while a cheeky laugh cuts through."}, {"start": 572.21, "end": 596.88, "b_start": 962.23, "b_end": 1003.45, "orig": "Jag\nkänner det som om i denna stund ingen i världen\nvore ensam mer än jag. Jag, medicine licentiaten\nTyko Gabriel Glas, som stundom hjälper andra\nmen aldrig har kunnat hjälpa mig själf, och som\nvid fyllda trettitre år aldrig har varit när en\nkvinna.", "en": "I feel as if at this moment no one in the world is more alone than I am. I, medical licentiate Tyko Gabriel Glas, who sometimes helps others but has never been able to help myself, and who at the age of thirty-three has never been a woman."}];
            window.__VOCAB_DATA__ = {};

            <div class="wp-trans" id="wp-trans"></div>
            <div class="wp-cognate" id="wp-cognate"></div>
            <div class="wp-etym" id="wp-etym"></div>
            <a class="wp-link" id="wp-link" target="_blank" rel="noopener">Open in Folkets lexikon &#x2197;</a>
        </div>
        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modeOnline = document.getElementById('modeOnline');
            const modeOffline = document.getElementById('modeOffline');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "doktor-glas-ch3.mp3", bilingual: "doktor-glas-ch3.bilingual.mp3" };
            const startPattern = null;
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            function toggleMode() {
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = (mode === 'orig') ? 'bilingual' : 'orig';
                audio.src = sources[mode];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                modeOnline.classList.toggle('active', mode === 'orig');
                modeOffline.classList.toggle('active', mode === 'bilingual');
                container.classList.toggle('offline-mode', mode === 'bilingual');
            }

            checkAudioStatus();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) return;
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('doktor-glas-ch3.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('doktor-glas-ch3.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (data.length > 0) {
                    let targetIdx = 0;
                    if (startPattern !== null) {
                        const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                        const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                        targetIdx = matchIdx !== -1 ? matchIdx : 0;
                    }
                    const target = data[targetIdx];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    const targetRow = document.getElementById('row-' + targetIdx);
                    if (targetRow) {
                        requestAnimationFrame(() => {
                            if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                            movePlayBtn(targetRow);
                        });
                    }
                    if (startPattern !== null) applySeek();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
