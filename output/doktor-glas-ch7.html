<!DOCTYPE html>

    <head>

        <title>Doktor Glas – Chapter 7</title>
        
        
        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 25.7, "b_start": 0.0, "b_end": 47.92, "orig": "19 juni. Så, fru Gregorius. Det var alltså ärendet. Litet ovanligt, det är sant. Hon kom sent denna gång, mottagningstiden\nvar förbi, och hon var ensam kvar i väntrummet. Hon steg in till mig, mycket blek, hälsade\noch blef stående midt i rummet.", "en": "June 19. So, Mrs. Gregorius. So that was the case. A little unusual, it's true. She arrived late this time, the reception time was over, and she was left alone in the waiting room. She stepped up to me, very pale, saluted and stood in the middle of the room."}, {"start": 26.7, "end": 49.53, "b_start": 47.92, "b_end": 88.46, "orig": "Jag gjorde en\ngest åt en stol, men hon stod kvar.\n– Jag narrades sist, sade hon. Jag är inte\nsjuk; jag är fullkomligt frisk. Det var något\nhelt annat jag ville tala med doktorn om, jag\nkunde bara inte få fram det då.", "en": "I gestured for a chair, but she remained standing. - I was tricked last, she said. I am not sick; I am perfectly healthy. There was something completely different I wanted to talk to the doctor about, I just couldn't bring it up at the time."}, {"start": 50.53, "end": 77.22, "b_start": 88.46, "b_end": 134.99, "orig": "En bryggarkärra skramlade förbi nere på\ngatan, jag gick fram och stängde fönstret och i\nden plötsliga tystnaden hörde jag henne säga,\nlågt och fast, men med en liten darrning på\norden, som om hon var nära gråt:\n– Jag har fått en så förfärlig afsky för min\nman. Jag stod med ryggen mot kakelugnen.", "en": "A brewer's cart rattled past down the street, I went over and closed the window, and in the sudden silence I heard her say, low and firm, but with a slight tremor in the words, as if she were close to tears: - I have developed such a terrible disgust for my husband. I stood with my back to the tiled stove."}, {"start": 78.22, "end": 108.1, "b_start": 134.99, "b_end": 186.41, "orig": "Jag\nböjde på hufvudet till tecken att jag följde med.\n– Inte som människa, fortfor hon. Han är\nalltid god och vänlig mot mig; aldrig har han\nsagt mig ett hårdt ord. Men han inger mig en\nså förfärlig motvilja. Hon drog djupt efter andan.\n– Jag vet inte hur jag skall uttrycka mig,\nsade hon.", "en": "I bowed my head to indicate that I was following along. - Not as a person, she continued. He is always good and kind to me; He has never said a harsh word to me. But he gives me such a terrible reluctance. She took a deep breath. - I don't know how to express myself, she said."}, {"start": 109.1, "end": 126.42, "b_start": 186.41, "b_end": 217.48, "orig": "Det som jag tänkte begära af doktorn\när något så besynnerligt. Och det strider kanske\nalldeles mot hvad ni anser vara rätt. Jag vet\nju inte hvad doktorn tänker om sådana saker.", "en": "What I was going to ask the doctor for is something so outlandish. And it may be completely contrary to what you consider to be right. I don't know what the doctor thinks about such things."}, {"start": 127.42, "end": 145.38, "b_start": 217.48, "b_end": 248.78, "orig": "Men det finns något hos er som inger mig förtroende, och jag vet ingen annan som jag skulle kunna\nanförtro mig åt i det här fallet, ingen annan i hela\nvärlden som skulle kunna hjälpa mig. Skulle\ndoktorn inte kunna tala med min man?", "en": "But there is something about you that gives me confidence, and I know no one else in whom I could confide in this case, no one else in the whole world who could help me. Couldn't the doctor talk to my husband?"}, {"start": 146.38, "end": 171.72, "b_start": 248.78, "b_end": 291.64, "orig": "Kunde\nni inte säga honom att jag lider af en sjukdom,\nnågot underlifslidande, och att han måste afstå\nfrån sina rättigheter, åtminstone för en tid? Rättigheter. Jag for med handen öfver pannan. Jag ser rödt för ögonen, när jag hör det\nordet nämnas i den betydelsen.", "en": "Couldn't you tell him that I am suffering from an illness, some underlying affliction, and that he must give up his rights, at least for a time? Rights. I ran my hand over my forehead. I see red when I hear that word mentioned in that sense."}, {"start": 172.72, "end": 177.04, "b_start": 291.64, "b_end": 313.01, "orig": "Gud i himlen,\nhur har det gått till i människornas hjärnor, när\nde gjorde rättigheter och plikter af detta! Det stod genast klart för mig, att här måste\njag hjälpa, om jag kunde. Men jag fann icke\nstrax något att säga, jag ville höra henne tala\nmera.", "en": "God in heaven, how did it happen in people's brains, when they made rights and duties out of this! It was immediately clear to me that I had to help here, if I could. But I didn't immediately find anything to say, I wanted to hear her speak more."}, {"start": 178.04, "end": 202.54, "b_start": 313.01, "b_end": 358.12, "orig": "Det är också möjligt, att min medkänsla\nför henne var blandad med en dosis rätt vanlig\noch enkel nyfikenhet.\n– Förlåt, fru Gregorius, frågade jag, hur\nlänge har ni varit gift?\n– I sex år.\n– Och har det som ni kallar er mans rättigheter alltid känts lika svårt för er som nu?", "en": "It is also possible that my compassion for her was mixed with a dose of quite ordinary and simple curiosity. - Sorry, Mrs. Gregorius, I asked, how long have you been married? - For six years. - And has what you call your husband's rights always felt as difficult for you as it does now?"}, {"start": 203.54, "end": 227.5, "b_start": 358.12, "b_end": 400.37, "orig": "Hon rodnade litet.\n– Det har alltid varit svårt, sade hon. Men\nnu på sista tiden har det blifvit mig outhärdligt. Jag förmår inte mera, jag vet inte hvad det skall\nbli af mig, om detta skall fortsätta.\n– Men, inföll jag, pastorn är ju inte längre\nung.", "en": "She blushed a little. - It has always been difficult, she said. But lately it has become unbearable for me. I can't do it anymore, I don't know what will become of me if this continues. - But, I thought, the pastor is no longer young."}, {"start": 228.5, "end": 253.34, "b_start": 400.37, "b_end": 444.76, "orig": "Det förvånar mig att han vid sin ålder kan\ngöra er så mycket ... förtret. Hur gammal är\nhan egentligen?\n– Femtiosex år, tror jag – nej, han är\nkanske femtiosju. Men han ser ju äldre ut.\n– Men säg mig, fru Gregorius – har ni\naldrig själf talat med honom om detta?", "en": "It amazes me that at his age he can make you so much ... upset. How old is he really? - Fifty-six years, I think - no, he's maybe fifty-seven. But he looks older. - But tell me, Mrs. Gregorius - have you never spoken to him about this yourself?"}, {"start": 254.34, "end": 269.31, "b_start": 444.76, "b_end": 471.62, "orig": "Sagt\nhonom hur mycket det plågar er, och bedt honom\nvänligt och vackert att skona er?\n– Jo, en gång har jag bedt honom om det. Men han svarade med en förmaning.", "en": "Tell him how much it pains you, and ask him kindly and beautifully to spare you? - Well, once I asked him for it. But he answered with an admonition."}, {"start": 270.31, "end": 297.7, "b_start": 471.62, "b_end": 517.88, "orig": "Han sade\natt vi inte kunde veta, om inte Gud har för afsikt\natt skänka oss ett barn, fast vi inte ha fått något\nhittills, och därför skulle det vara en mycket\nstor synd om vi slutade upp med det som Gud\nvill att vi skall göra för att få barn ... Och han\nhar kanske rätt. Men det är så svårt för mig.", "en": "He said that we could not know, unless God intends to give us a child, although we have not received anything so far, and therefore it would be a very great sin if we stopped doing what God wants us to do in order to have a child... And he may be right. But it's so hard for me."}, {"start": 298.7, "end": 310.82, "b_start": 517.88, "b_end": 540.02, "orig": "Jag kunde inte undertrycka ett leende. Hvilken inpiskad gammal skojare! Hon såg mitt leende, och jag tror att hon\nmissförstod det.", "en": "I couldn't suppress a smile. What a whipped old joker! She saw my smile, and I think she misunderstood it."}, {"start": 311.82, "end": 337.18, "b_start": 540.02, "b_end": 583.52, "orig": "Hon stod tyst ett ögonblick,\nsom om hon betänkte sig; så började hon tala\nigen, lågt och darrande, medan rodnaden steg\nallt högre och mörkare öfver hennes hy.\n– Nej, ni måste veta allt, sade hon. Ni\nhar kanske redan gissat det, ni ser ju midt\nigenom mig.", "en": "She stood silent for a moment, as if considering; then she began to speak again, low and trembling, while the blush rose higher and darker over her complexion. - No, you must know everything, she said. You may have already guessed it, you see right through me."}, {"start": 338.18, "end": 366.41, "b_start": 583.52, "b_end": 632.33, "orig": "Jag begär ju att ni skall narras\nför min skull, då måste jag åtminstone vara\nuppriktig mot er. Ni får döma mig hur ni vill. Jag är en otrogen hustru. Jag tillhör en annan\nman. Och det är därför det har blifvit så förfärligt svårt för mig. Hon undvek min blick, medan hon sade\ndetta.", "en": "I ask that you be tricked for my sake, then I must at least be honest with you. You can judge me however you want. I am a cheating wife. I belong to another man. And that is why it has become so terribly difficult for me. She avoided my gaze as she said this."}, {"start": 367.41, "end": 394.26, "b_start": 632.33, "b_end": 679.21, "orig": "Men jag, jag såg henne egentligen först\nnu. Nu först såg jag, att det stod en kvinna i\nmitt rum, en kvinna med hjärtat öfverfullt af\nlust och elände, en ung kvinnoblomma med doft\naf kärlek omkring sig och med blygselrodnad\nöfver att doften var så mäktig och stark. Jag kände att jag bleknade.", "en": "But I, I really only saw her now. Now for the first time I saw that there was a woman standing in my room, a woman with a heart overflowing with lust and misery, a young female flower with the scent of love around her and blushing because the scent was so powerful and strong. I felt myself fading."}, {"start": 395.26, "end": 410.22, "b_start": 679.21, "b_end": 706.94, "orig": "Ändtligen såg hon upp och mötte min blick. Jag vet inte hvad hon trodde sig läsa i den, men\nhon kunde icke hålla sig upprätt längre, hon\nsjönk ner på en stol, skakande af gråt.", "en": "Finally she looked up and met my gaze. I don't know what she thought she was reading in it, but she couldn't stay upright any longer, she sank down on a chair, shaking with tears."}, {"start": 411.22, "end": 437.28, "b_start": 706.94, "b_end": 752.36, "orig": "Kanske\ntrodde hon att jag tog hela saken frivolt, kanske\nockså att jag var likgiltig och hård och att hon till\ningen nytta hade blottat sig för en främmande man. Jag gick fram till henne, tog hennes hand,\nklappade den sakta: Seså, inte gråta, inte gråta\nmera nu. Jag vill hjälpa er.", "en": "Perhaps she thought I was taking the whole thing lightly, perhaps also that I was indifferent and harsh and that she had exposed herself to a strange man to no avail. I went up to her, took her hand, patted it slowly: Look, don't cry, don't cry anymore now. I want to help you."}, {"start": 438.28, "end": 463.62, "b_start": 752.36, "b_end": 797.69, "orig": "Jag lofvar er det.\n– Tack, tack ... Hon kysste min hand, hon vätte den med\nsina tårar. Bara en enda våldsam snyftning\ntill, så lyste det upp ett leende genom gråten. Jag måste också le.\n– Men ni var dum som talade om det där\nsista, sade jag.", "en": "I promise you that. - Thank you, thank you ... She kissed my hand, she wet it with her tears. Just one more violent sob, and a smile lit up through the crying. I have to smile too. - But you were stupid to talk about that last thing, I said."}, {"start": 464.62, "end": 484.52, "b_start": 797.69, "b_end": 834.54, "orig": "Inte för att ni behöfver vara\nrädd att jag missbrukar ert förtroende; men sådant skall man hålla hemligt. Alltid, utan undantag, så länge man kan. Och jag hade naturligtvis hjälpt er ändå. Hon svarade:\n– Jag ville säga det.", "en": "Not that you need fear that I will abuse your trust; but such things must be kept secret. Always, without exception, as long as you can. And of course I would have helped you anyway. She replied: - I wanted to say that."}, {"start": 485.52, "end": 508.18, "b_start": 834.54, "b_end": 874.82, "orig": "Jag ville, att någon\nsom jag aktar högt och ser upp till skulle veta\ndet och likväl inte förakta mig. Så kom en lång historia: hon hade en gång\nför ungefär ett år sedan hört på ett samtal mellan mig och hennes man, pastorn – han var\ndålig, och jag var där på sjukbesök.", "en": "I wanted someone whom I hold in high esteem and look up to to know that and yet not despise me. Then came a long story: once, about a year ago, she had overheard a conversation between me and her husband, the pastor - he was ill, and I was there on a sick visit."}, {"start": 509.18, "end": 536.08, "b_start": 874.82, "b_end": 921.37, "orig": "Vi hade\nkommit att tala om prostitutionen. Hon mindes\nallt hvad jag hade sagt och repade upp det för\nmig – det var något mycket enkelt och vanligt,\ndessa stackars flickor äro också människor och\nböra behandlas som människor o. s. v. Men hon\nhade aldrig hört någon tala så förr.", "en": "We had come to talk about prostitution. She remembered everything I had said and repeated it to me - it was something very simple and ordinary, these poor girls are human beings too and should be treated as human beings, etc. But she had never heard anyone talk like that before."}, {"start": 537.08, "end": 560.34, "b_start": 921.37, "b_end": 962.76, "orig": "Sedan dess\nhade hon sett upp till mig, och det var därför\nhon nu hade fått mod att anförtro sig åt mig. Allt det där hade jag glömt, totalt ... Gömdt\ni snö, kommer upp i tö. Jag lofvade alltså att tala med hennes man\nännu samma dag, och hon gick.", "en": "Since then she had looked up to me, and that was why she had now found the courage to confide in me. I had forgotten all that, totally ... Hidden in snow, coming up in the thaw. So I promised to speak to her husband that same day, and she went."}, {"start": 561.34, "end": 591.46, "b_start": 962.76, "b_end": 1012.84, "orig": "Men hon hade\nglömt handskar och parasoll, hon kom tillbaka\noch hämtade dem och försvann igen. Hon strålade och lyste, glad och yr som ett barn, som\nhar fått sin vilja fram och som väntar sig något\nmycket roligt.\n*\nJag gick dit på eftermiddagen. Hon hade\nförberedt honom; det var öfverenskommet.", "en": "But she had forgotten gloves and parasol, she came back and got them and disappeared again. She beamed and shone, happy and giddy like a child who has had her way and is expecting something very fun. * I went there in the afternoon. She had prepared him; it was agreed upon."}, {"start": 592.46, "end": 622.31, "b_start": 1012.84, "b_end": 1062.48, "orig": "Jag\nhade ett samtal med honom i enrum. Han var\nännu gråare i ansiktet än vanligt.\n– Ja, sade han, min hustru har ju redan\nsagt mig hur det står till. Jag kan inte säga\nhur ondt det gör mig om henne. Vi hade så\ninnerligt hoppats och önskat, att vi en gång skulle\nfå ett litet barn.", "en": "I had a conversation with him in private. His face was even grayer than usual. - Yes, he said, my wife has already told me how it is. I can't tell you how sorry I am for her. We had so fervently hoped and wished that one day we would have a small child."}, {"start": 623.31, "end": 641.77, "b_start": 1062.48, "b_end": 1095.4, "orig": "Men jag vill inte vara med om\nskilda sofrum, det måste jag bestämdt säga ifrån. Det är ju så ovanligt i våra kretsar, det skulle\nbara ge anledning till prat. Och jag är ju för\nresten en gammal man.", "en": "But I don't want to be involved in separate bedrooms, I have to say that firmly. It is so unusual in our circles, it would only give rise to talk. And I am, after all, an old man."}, {"start": 642.77, "end": 665.16, "b_start": 1095.4, "b_end": 1135.54, "orig": "Han hostade ihåligt.\n– Ja, sade jag, jag betviflar naturligtvis inte\natt pastorn sätter sin hustrus hälsa framför allt\nannat. Och för öfrigt är det ju godt hopp om\natt vi skall kunna få henne frisk igen.\n– Det ber jag till Gud om, svarade han.", "en": "He coughed hollowly. - Yes, I said, of course I have no doubt that the pastor puts his wife's health before everything else. And for the rest, there is good hope that we will be able to get her healthy again. - I pray to God for that, he replied."}, {"start": 666.16, "end": 682.7, "b_start": 1135.54, "b_end": 1165.5, "orig": "Men hur länge tror doktorn att det kan dra om?\n– Det är svårt att säga. Men ett halft års\nabsolut afhållsamhet blir säkert nödvändigt. Sedan\nfå vi ju se ...", "en": "But how long does the doctor think it can go on for? - It is difficult to say. But half a year of absolute abstinence will certainly be necessary. Then we'll see..."}, {"start": 683.7, "end": 704.41, "b_start": 1165.5, "b_end": 1202.5, "orig": "Han har ett par smutsbruna fläckar i ansiktet;\nde blefvo ännu mörkare och tydligare nu mot den\nfärglösa hyn, och ögonen liksom krympte ihop.\n*\nHan har varit gift en gång förr; bra synd\natt hon dog, den första hustrun!", "en": "He has a couple of dirty brown spots on his face; they became even darker and clearer now against the colorless complexion, and the eyes seemed to shrink. * He has been married once before; good pity she died, the first wife!"}, {"start": 705.41, "end": 722.52, "b_start": 1202.5, "b_end": 1234.84, "orig": "I hans arbetsrum hänger det ett porträtt af henne i svartkritsförstoring: en simpel och knotig och »fromsinlig»\npigtyp, inte alltför olik den goda Katarina von Bora. Hon passade honom säkert. Synd att hon dog!", "en": "In his study hangs a portrait of her in black chalk enlargement: a simple and gnarled and \"pious\" pig type, not too unlike the good Katarina von Bora. She certainly suited him. Too bad she died!"}];
            window.__VOCAB_DATA__ = {};
        </script>
        <style>
            :root { --primary: #004a99; --accent: #ffc107; --bg: #f0f2f5; }

                display: flex; align-items: center; justify-content: space-between;

            }

            .row.highlight { background: #fffde7; border-left: none; outline: 3px solid var(--accent); transition: outline 0.3s ease; }
            .row-nav {
                width: 32px; flex-shrink: 0; background: #e8f0fe;

                cursor: pointer; user-select: none; transition: background 0.15s;
            }
            .row.highlight .row-nav { background: #c5d8fb; }

            @keyframes navFlash { 0%,100% { background: #e8f0fe; } 50% { background: var(--accent); } }
            .row-nav.flash { animation: navFlash 0.35s ease-out; }

            .pin-btn { font-size: 0.75rem; opacity: 0.4; cursor: pointer; line-height: 1; }
            .row-nav.pinned .pin-btn { opacity: 1; }
            .row-content { flex: 1; padding: 12px 15px; display: flex; flex-direction: column; min-width: 0; }
            #play-btn {
                display: block; position: fixed; left: 8px; top: 140px; z-index: 50;
                background: var(--accent); border: none; border-radius: 50%;
                width: 36px; height: 36px; font-size: 1rem; cursor: pointer;
                box-shadow: 0 2px 6px rgba(0,0,0,0.2); line-height: 36px; text-align: center;
            }
            .orig { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
            .en { display: none; color: #546e7a; font-style: italic; font-size: 0.95rem; margin-top: 6px; padding-top: 6px; border-top: 1px solid #e8e8e8; }
            .row.highlight .en { display: block; }
            .offline-mode .en { display: block; }
            .status-badge { font-size: 0.7rem; margin-left: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
            .sv-word { cursor: pointer; color: #1565c0; }
            .sv-word .wikt-arrow { font-size: 0.55em; vertical-align: super; opacity: 0.6; }
            #word-popup {
                display: none; position: fixed; z-index: 999;
                background: white; border: 1px solid #ccc; border-radius: 10px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.18); padding: 12px 15px;
                max-width: 280px; font-size: 0.85rem; line-height: 1.5;
            }
            #word-popup .wp-lemma { font-size: 1rem; font-weight: bold; color: var(--primary); }
            #word-popup .wp-trans { color: #546e7a; font-style: italic; margin-bottom: 4px; }
            #word-popup .wp-cognate { color: #1565c0; font-weight: bold; }
            #word-popup .wp-etym { color: #555; font-size: 0.78rem; margin-top: 4px; }
            #word-popup .wp-link { display: inline-block; margin-top: 6px; font-size: 0.75rem; color: #2e7d32; text-decoration: underline; }
            #word-popup .wp-close { float: right; cursor: pointer; color: #999; font-size: 1rem; line-height: 1; margin-left: 8px; }
            @media (max-width: 768px) { .row { padding: 10px 12px; } }
        </style>
    </head>
    <body>
        <div class="header-box">
            <div class="header-top">
                <div class="header-left">
                    <div class="header-meta"><em style="font-weight:normal;">Personal/educational use only.</em></div>
                    <h1 class="header-title">Doktor Glas – Chapter 7</h1>
                    <div class="header-subtitle">Hjalmar Söderberg</div>
                </div>
                <div class="header-right">
                    <audio id="audio" preload="metadata" src="doktor-glas-ch7.mp3"></audio>
                    <span id="audio-status" class="status-badge"></span>
                </div>
            </div>
            <div class="header-controls">
                <span class="speed-label">SPEED:</span>
                <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                <button class="speed-btn active" onclick="setSpeed(1.0)">1x</button>
                <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                <span class="divider">|</span>
                <div class="mode-toggle">
                    <button id="modeOnline" class="mode-opt active" onclick="if(mode!=='orig')toggleMode()">Online</button>
                    <button id="modeOffline" class="mode-opt" onclick="if(mode!=='bilingual')toggleMode()">Offline</button>
                </div>
            </div>
        </div>
        
        <button id="play-btn" onclick="togglePlayPause()">&#x25B6;</button>
        <div id="word-tip">
            <span>Tap a <strong style="color:#1565c0;">blue word</strong> in the transcript to see its definition.</span>
            <span id="word-tip-close" onclick="dismissTip()">&#x2715;</span>
        </div>
        <div id="word-popup">
            <span class="wp-close" onclick="closePopup()">&#x2715;</span>
            <div class="wp-lemma" id="wp-lemma"></div>
            <div class="wp-trans" id="wp-trans"></div>
            <div class="wp-cognate" id="wp-cognate"></div>
            <div class="wp-etym" id="wp-etym"></div>
            <a class="wp-link" id="wp-link" target="_blank" rel="noopener">Open in Folkets lexikon &#x2197;</a>
        </div>
        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modeOnline = document.getElementById('modeOnline');
            const modeOffline = document.getElementById('modeOffline');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "doktor-glas-ch7.mp3", bilingual: "doktor-glas-ch7.bilingual.mp3" };
            const startPattern = null;
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            function toggleMode() {
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = (mode === 'orig') ? 'bilingual' : 'orig';
                audio.src = sources[mode];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                modeOnline.classList.toggle('active', mode === 'orig');
                modeOffline.classList.toggle('active', mode === 'bilingual');
                container.classList.toggle('offline-mode', mode === 'bilingual');
            }

            checkAudioStatus();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) return;
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('doktor-glas-ch7.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('doktor-glas-ch7.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (data.length > 0) {
                    let targetIdx = 0;
                    if (startPattern !== null) {
                        const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                        const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                        targetIdx = matchIdx !== -1 ? matchIdx : 0;
                    }
                    const target = data[targetIdx];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    const targetRow = document.getElementById('row-' + targetIdx);
                    if (targetRow) {
                        requestAnimationFrame(() => {
                            if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                            movePlayBtn(targetRow);
                        });
                    }
                    if (startPattern !== null) applySeek();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
